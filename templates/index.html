<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Soporte Rotork IA</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    padding: 30px;
}

h1 {
    margin-bottom: 20px;
}

.botones {
    margin-bottom: 20px;
}

.botones button {
    margin-right: 10px;
    padding: 10px;
    background: #1e293b;
    color: white;
    border: none;
    cursor: pointer;
}

.botones button.activo {
    background: #06b6d4;
    color: black;
}

textarea {
    width: 100%;
    height: 120px;
    margin-bottom: 20px;
}

input {
    margin-bottom: 20px;
}

button.analizar {
    background: #06b6d4;
    padding: 12px 25px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

#respuesta {
    margin-top: 20px;
    background: #1e293b;
    padding: 20px;
}
</style>

</head>
<body>

<h1>🔧 Soporte Rotork IA</h1>

<div class="botones">
    <button onclick="seleccionar('AUTO')" id="AUTO">AUTO</button>
    <button onclick="seleccionar('IQ')" id="IQ">IQ</button>
    <button onclick="seleccionar('CK')" id="CK">CK</button>
    <button onclick="seleccionar('MASTER')" id="MASTER">MASTER</button>
</div>

<textarea id="descripcion" placeholder="Describe la falla..."></textarea>

<input type="file" id="imagen">

<br>

<button class="analizar" onclick="analizar()">Analizar Falla</button>

<div id="respuesta"></div>

<script>
let sistemaSeleccionado = "AUTO";

function seleccionar(sistema) {
    sistemaSeleccionado = sistema;

    document.querySelectorAll(".botones button").forEach(b => b.classList.remove("activo"));
    document.getElementById(sistema).classList.add("activo");
}

async function analizar() {
    const descripcion = document.getElementById("descripcion").value;
    const imagen = document.getElementById("imagen").files[0];

    const formData = new FormData();
    formData.append("descripcion", descripcion);
    formData.append("sistema", sistemaSeleccionado);

    if (imagen) {
        formData.append("imagen", imagen);
    }

    document.getElementById("respuesta").innerText = "⏳ Analizando...";

    try {
        const response = await fetch("/analizar", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        document.getElementById("respuesta").innerText = data.respuesta;

    } catch (error) {
        document.getElementById("respuesta").innerText = "❌ Error conectando con el servidor";
    }
}
</script>

</body>
</html>
